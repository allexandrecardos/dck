version: 2
project_name: dck

before:
  hooks:
    - go mod tidy

builds:
  - id: dck
    main: "."
    binary: dck
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-X github.com/allexandrecardos/dck/cmd.version={{.Version}}"
      - "-X github.com/allexandrecardos/dck/cmd.commit={{.Commit}}"
      - "-X github.com/allexandrecardos/dck/cmd.date={{.Date}}"
    goos:
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - binary
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "SHA256SUMS"

release:
  draft: false
  prerelease: "auto"
